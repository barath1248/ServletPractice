<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Add Products</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color:#f5f5f5;
    font-family:Arial, sans-serif;
}

.container{
    background:white;
    padding:30px 40px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

table{
    margin:auto;
}

td{
    padding:10px;
}

input[type="text"]{
    width:220px;
    padding:8px;
}

input[type="submit"]{
    width:150px;
    padding:10px;
    margin-top:15px;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container">
    <h1>Add Product</h1>

    <form action="aps" method="post">
        <table>
            <tr>
                <td>PCODE</td>
                <td><input type="text" name="pcode"></td>
            </tr>

            <tr>
                <td>PNAME</td>
                <td><input type="text" name="pname"></td>
            </tr>

            <tr>
                <td>PCOMPANY</td>
                <td><input type="text" name="pcompany"></td>
            </tr>

            <tr>
                <td>PRICE</td>
                <td><input type="text" name="pprice"></td>
            </tr>

            <tr>
                <td>PQUANTITY</td>
                <td><input type="text" name="pqty"></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Add Product">
                </td>
            </tr>
        </table>
    </form>
</div>

</body>
</html>
