<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Customer Registration</title>
</head>

<body>

<center>

<h1><u>Customer Registration Form</u></h1>

<form action="crs" method="post">

<table cellpadding="8">

<tr>
    <td>User Name</td>
    <td><input type="text" name="cname" required></td>
</tr>

<tr>
    <td>Password</td>
    <td><input type="password" name="password" required></td>
</tr>

<tr>
    <td>First Name</td>
    <td><input type="text" name="cfname" required></td>
</tr>

<tr>
    <td>Last Name</td>
    <td><input type="text" name="clname" required></td>
</tr>

<tr>
    <td>Address</td>
    <td><input type="text" name="caddress" required></td>
</tr>

<tr>
    <td>Email</td>
    <td><input type="email" name="cmail" required></td>
</tr>

<tr>
    <td>Mobile Number</td>
    <td><input type="tel" name="cmobile" required></td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </td>
</tr>

</table>

</form>

<br>

Already have an account?
<a href="CustomerLogin.html">Login</a>

</center>

</body>
</html>
