<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Multiple Servlet Application</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        text-align: center;
        border: 2px solid #000;
        padding: 25px;
        border-radius: 8px;
    }

    input[type="text"] {
        padding: 6px;
        margin-top: 10px;
    }

    input[type="submit"] {
        width: 120px;
        padding: 8px;
        margin-top: 15px;
    }
</style>

</head>
<body>

<div class="container">
    <div class="box">
        <h2>Multiple Servlet Application</h2>

        <form action="ms" method="post">
            <label>Enter Your Number</label><br><br>

            <input type="text" name="num" required><br><br>

            <input type="submit" name="choice" value="factorial"><br><br>

            <input type="submit" name="choice" value="CheckEven">
        </form>
    </div>
</div>

</body>
</html>
